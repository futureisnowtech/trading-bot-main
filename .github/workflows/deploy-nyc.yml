name: Protected NYC Deploy

on:
  workflow_dispatch:
    inputs:
      confirm_production:
        description: "Confirm protected deploy to NYC production"
        required: true
        type: boolean
        default: false
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: nyc-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Protected deploy to NYC
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_production == 'true') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'feature/v10-rebuild' &&
       vars.NYC_AUTO_DEPLOY_ENABLED == 'true')
    runs-on: ubuntu-latest
    environment:
      name: nyc-production

    steps:
      - name: Resolve deploy ref
        id: plan
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            echo "deploy_ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "deploy_mode=auto-after-ci" >> "$GITHUB_OUTPUT"
            echo "deploy_reason=CI succeeded on feature/v10-rebuild and NYC_AUTO_DEPLOY_ENABLED=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_ref=feature/v10-rebuild" >> "$GITHUB_OUTPUT"
            echo "deploy_mode=manual-dispatch" >> "$GITHUB_OUTPUT"
            echo "deploy_reason=Manual protected dispatch" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout deploy ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.plan.outputs.deploy_ref }}

      - name: Assert deploy secret exists
        run: |
          if [ -z "${{ secrets.NYC_SSH_PRIVATE_KEY }}" ]; then
            echo "Missing NYC_SSH_PRIVATE_KEY secret on the nyc-production environment."
            echo "Configure the environment first; do not use repo-level secrets for production deploys."
            exit 1
          fi

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install proof and deploy dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pytest pytest-cov ruff \
            python-dotenv pandas numpy pytz requests \
            yfinance schedule psutil \
            "pandas-ta>=0.3.14b0"
          pip install "python-binance>=1.0.19"
          pip install scikit-learn lightgbm xgboost
          pip install "streamlit>=1.35"

      - name: Create test .env for validation
        run: |
          cat > .env << 'EOF'
          PAPER_TRADING=true
          ANTHROPIC_API_KEY=test_key_ci
          ACCOUNT_SIZE=5000
          BINANCE_API_KEY=test_key_ci
          BINANCE_API_SECRET=test_secret_ci
          BINANCE_TESTNET=true
          PERP_PAIRS=BTCUSDT,ETHUSDT
          FUTURES_LANE_ACTIVE=false
          FORECAST_LANE_ACTIVE=false
          EOF

      - name: Proof suite
        run: |
          python -m pytest tests/proof/ -q --tb=short --no-header -p no:warnings

      - name: Validate config
        run: |
          python scripts/validate.py

      - name: Repo truth gate (strict)
        run: |
          python scripts/repo_truth_gate.py --strict

      - name: Load production SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.NYC_SSH_PRIVATE_KEY }}

      - name: Seed known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 2222 64.225.20.38 >> ~/.ssh/known_hosts

      - name: Preflight remote reachability
        run: |
          ssh -o BatchMode=yes -p 2222 root@64.225.20.38 'echo NYC preflight OK'

      - name: Deploy exact authored SHA
        run: |
          chmod +x deploy.sh
          ./deploy.sh

      - name: Verify deployed SHA and health
        run: |
          EXPECTED_SHA="$(git rev-parse HEAD)"
          REMOTE_SHA="$(ssh -o BatchMode=yes -p 2222 root@64.225.20.38 "awk -F= '/^sha=/{print \$2}' /root/bot/version.txt")"
          if [ "$REMOTE_SHA" != "$EXPECTED_SHA" ]; then
            echo "Remote SHA mismatch: expected $EXPECTED_SHA got $REMOTE_SHA"
            exit 1
          fi
          ssh -o BatchMode=yes -p 2222 root@64.225.20.38 '
            for _ in $(seq 1 24); do
              status=$(docker inspect -f "{{.State.Health.Status}}" algo-bot-live 2>/dev/null || echo unknown)
              if [ "$status" = "healthy" ]; then
                docker ps --format "table {{.Names}}\t{{.Status}}"
                exit 0
              fi
              sleep 5
            done
            echo "algo-bot-live did not reach healthy state in time"
            docker ps --format "table {{.Names}}\t{{.Status}}"
            exit 1
          '

      - name: Deployment summary
        run: |
          {
            echo "## Protected NYC Deploy"
            echo ""
            echo "- Mode: \`${{ steps.plan.outputs.deploy_mode }}\`"
            echo "- Reason: ${{ steps.plan.outputs.deploy_reason }}"
            echo "- SHA: \`$(git rev-parse HEAD)\`"
            echo "- Branch: \`${GITHUB_REF_NAME}\`"
            echo "- Environment: \`nyc-production\`"
          } >> "$GITHUB_STEP_SUMMARY"
