<svg viewBox="0 0 600 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Court background -->
  <rect width="600" height="350" rx="12" fill="#C68B59" opacity="0.15"/>
  <!-- Court lines -->
  <rect x="20" y="20" width="560" height="310" rx="8" fill="none" stroke="#C77DFF" stroke-width="2.5" opacity="0.7"/>
  <!-- Center circle -->
  <circle cx="300" cy="175" r="60" fill="none" stroke="#C77DFF" stroke-width="2" opacity="0.6"/>
  <!-- Center line -->
  <line x1="300" y1="20" x2="300" y2="330" stroke="#C77DFF" stroke-width="2" opacity="0.5"/>
  <!-- Left key -->
  <rect x="20" y="100" width="140" height="150" rx="4" fill="#7B2FBE" fill-opacity="0.1" stroke="#C77DFF" stroke-width="2" opacity="0.6"/>
  <!-- Left arc -->
  <path d="M160,100 Q240,175 160,250" fill="none" stroke="#C77DFF" stroke-width="2" opacity="0.5"/>
  <!-- Left basket -->
  <circle cx="52" cy="175" r="12" fill="none" stroke="#C77DFF" stroke-width="2.5" opacity="0.8"/>
  <rect x="20" y="165" width="32" height="20" rx="2" fill="#C77DFF" opacity="0.3"/>
  <!-- Right key -->
  <rect x="440" y="100" width="140" height="150" rx="4" fill="#7B2FBE" fill-opacity="0.1" stroke="#C77DFF" stroke-width="2" opacity="0.6"/>
  <!-- Right arc -->
  <path d="M440,100 Q360,175 440,250" fill="none" stroke="#C77DFF" stroke-width="2" opacity="0.5"/>
  <!-- Right basket -->
  <circle cx="548" cy="175" r="12" fill="none" stroke="#C77DFF" stroke-width="2.5" opacity="0.8"/>
  <rect x="548" y="165" width="32" height="20" rx="2" fill="#C77DFF" opacity="0.3"/>
  <!-- 3-point line right hint -->
  <path d="M580,50 Q620,175 580,300" fill="none" stroke="#C77DFF" stroke-width="1.5" opacity="0.3" stroke-dasharray="6,4"/>
  <path d="M20,50 Q-20,175 20,300" fill="none" stroke="#C77DFF" stroke-width="1.5" opacity="0.3" stroke-dasharray="6,4"/>
</svg>