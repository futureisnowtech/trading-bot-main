<svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="200" rx="14" fill="#D62828" stroke="#FF6B6B" stroke-width="3"/>
  <!-- Home score -->
  <rect x="20" y="20" width="180" height="160" rx="10" fill="#8B0000" opacity="0.5"/>
  <text x="110" y="65" text-anchor="middle" font-size="16" fill="#FF6B6B" font-family="Arial,sans-serif" font-weight="bold">HOME</text>
  <text x="110" y="145" text-anchor="middle" font-size="72" fill="white" font-family="Arial Black,sans-serif" font-weight="900">87</text>
  <!-- Divider -->
  <text x="250" y="115" text-anchor="middle" font-size="48" fill="#FF6B6B" font-family="Arial Black,sans-serif">-</text>
  <!-- Quarter/time -->
  <text x="250" y="60" text-anchor="middle" font-size="13" fill="#FF6B6B" font-family="Arial,sans-serif">Q4  2:34</text>
  <!-- Away score -->
  <rect x="300" y="20" width="180" height="160" rx="10" fill="#8B0000" opacity="0.3"/>
  <text x="390" y="65" text-anchor="middle" font-size="16" fill="#FF6B6B" font-family="Arial,sans-serif" font-weight="bold">AWAY</text>
  <text x="390" y="145" text-anchor="middle" font-size="72" fill="#FF6B6B" font-family="Arial Black,sans-serif" font-weight="900">82</text>
</svg>