<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;}
@keyframes charge{0%{r:10;opacity:0.3}50%{r:55;opacity:1}100%{r:10;opacity:0.3}}
@keyframes beam-fire{0%,100%{opacity:0;transform:scaleX(0)}20%{opacity:1;transform:scaleX(1)}80%{opacity:1;transform:scaleX(1)}}
@keyframes orbit{from{transform:rotate(0deg) translateX(80px) rotate(0deg)}to{transform:rotate(360deg) translateX(80px) rotate(-360deg)}}
@keyframes spark{0%{transform:translateX(0) translateY(0);opacity:1}100%{transform:translateX(var(--dx)) translateY(var(--dy));opacity:0}}
.container{position:relative;width:600px;height:300px;}
.beam-wrapper{position:absolute;left:100px;top:50%;transform:translateY(-50%);transform-origin:left center;}
.orbiter{position:absolute;left:200px;top:130px;width:10px;height:10px;border-radius:50%;background:#44AAFF;animation:orbit 0.8s linear infinite;}
</style>
</head><body>
<div class="container">
<svg width="600" height="300" viewBox="0 0 600 300">
  <defs>
    <radialGradient id="core_g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="40%" stop-color="#44AAFF"/>
      <stop offset="100%" stop-color="#002288" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam_lg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#44AAFF"/>
      <stop offset="100%" stop-color="#44AAFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Charge ball -->
  <circle cx="150" cy="150" r="100" fill="#002288" opacity="0.15">
    <animate attributeName="r" values="80;110;80" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.25;0.1" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="150" r="60" fill="#002288" opacity="0.3">
    <animate attributeName="r" values="50;70;50" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <!-- Main energy orb -->
  <circle cx="150" cy="150" r="45" fill="url(#core_g)">
    <animate attributeName="r" values="38;50;38" dur="0.6s" repeatCount="indefinite"/>
  </circle>
  <!-- Inner bright core -->
  <circle cx="150" cy="150" r="18" fill="white" opacity="0.8">
    <animate attributeName="r" values="14;22;14" dur="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="0.6s" repeatCount="indefinite"/>
  </circle>
  <!-- Orbiting energy rings -->
  <ellipse cx="150" cy="150" rx="75" ry="22" fill="none" stroke="#44AAFF" stroke-width="2" opacity="0.5" transform="rotate(30,150,150)">
    <animateTransform attributeName="transform" type="rotate" from="0 150 150" to="360 150 150" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="150" cy="150" rx="68" ry="18" fill="none" stroke="#002288" stroke-width="1.5" opacity="0.4" transform="rotate(-45,150,150)">
    <animateTransform attributeName="transform" type="rotate" from="0 150 150" to="-360 150 150" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Beam (fires from orb) -->
  <rect x="195" y="138" width="380" height="24" rx="5" fill="url(#beam_lg)" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="width" values="0;0;380;380;0;0" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="195" y="144" width="380" height="12" rx="4" fill="white" opacity="0">
    <animate attributeName="opacity" values="0;0;0.7;0.7;0;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="width" values="0;0;380;380;0;0" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- Sparks -->
  <circle cx="215" cy="150" r="4" fill="#44AAFF"><animate attributeName="r" values="1;2;1" dur="1.2s" repeatCount="indefinite" begin="0.6s"/></circle><circle cx="211" cy="172" r="4" fill="#44AAFF"><animate attributeName="r" values="1;4;1" dur="1.5s" repeatCount="indefinite" begin="0.6s"/></circle><circle cx="199" cy="191" r="4" fill="#44AAFF"><animate attributeName="r" values="1;5;1" dur="1.3s" repeatCount="indefinite" begin="0.3s"/></circle><circle cx="182" cy="206" r="1" fill="#44AAFF"><animate attributeName="r" values="1;4;1" dur="0.6s" repeatCount="indefinite" begin="0.4s"/></circle><circle cx="161" cy="214" r="3" fill="#44AAFF"><animate attributeName="r" values="1;5;1" dur="0.6s" repeatCount="indefinite" begin="0.4s"/></circle><circle cx="138" cy="214" r="1" fill="#44AAFF"><animate attributeName="r" values="1;2;1" dur="1.4s" repeatCount="indefinite" begin="0.9s"/></circle><circle cx="117" cy="206" r="2" fill="#44AAFF"><animate attributeName="r" values="1;5;1" dur="0.5s" repeatCount="indefinite" begin="0.9s"/></circle><circle cx="100" cy="191" r="1" fill="#44AAFF"><animate attributeName="r" values="1;5;1" dur="1.2s" repeatCount="indefinite" begin="0.7s"/></circle><circle cx="88" cy="172" r="4" fill="#44AAFF"><animate attributeName="r" values="1;3;1" dur="1.3s" repeatCount="indefinite" begin="0.4s"/></circle><circle cx="85" cy="150" r="4" fill="#44AAFF"><animate attributeName="r" values="1;3;1" dur="1.2s" repeatCount="indefinite" begin="0.8s"/></circle><circle cx="88" cy="127" r="3" fill="#44AAFF"><animate attributeName="r" values="1;3;1" dur="1.3s" repeatCount="indefinite" begin="0.6s"/></circle><circle cx="100" cy="108" r="4" fill="#44AAFF"><animate attributeName="r" values="1;2;1" dur="1.2s" repeatCount="indefinite" begin="0.2s"/></circle><circle cx="117" cy="93" r="2" fill="#44AAFF"><animate attributeName="r" values="1;2;1" dur="0.7s" repeatCount="indefinite" begin="0.3s"/></circle><circle cx="138" cy="85" r="3" fill="#44AAFF"><animate attributeName="r" values="1;4;1" dur="1.1s" repeatCount="indefinite" begin="0.4s"/></circle><circle cx="161" cy="85" r="3" fill="#44AAFF"><animate attributeName="r" values="1;2;1" dur="0.9s" repeatCount="indefinite" begin="0.6s"/></circle><circle cx="182" cy="93" r="1" fill="#44AAFF"><animate attributeName="r" values="1;2;1" dur="1.0s" repeatCount="indefinite" begin="0.9s"/></circle><circle cx="199" cy="108" r="1" fill="#44AAFF"><animate attributeName="r" values="1;3;1" dur="1.4s" repeatCount="indefinite" begin="0.3s"/></circle><circle cx="211" cy="127" r="3" fill="#44AAFF"><animate attributeName="r" values="1;3;1" dur="1.4s" repeatCount="indefinite" begin="0.6s"/></circle>
</svg>
</div>
</body></html>
