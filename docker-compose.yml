services:
  execution-engine:
    image: ${IMAGE_NAME:-algo-trading-bot}:latest
    build: .
    container_name: execution-engine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    command:
      - /bin/bash
      - -lc
      - while true; do python3 sniper_cron.py; sleep ${SNIPER_SLEEP_SECONDS:-300}; done
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "3"

  telegram-oracle:
    image: ${IMAGE_NAME:-algo-trading-bot}:latest
    build: .
    container_name: telegram-oracle
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    command: ["python3", "telegram_daemon.py"]
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "3"
