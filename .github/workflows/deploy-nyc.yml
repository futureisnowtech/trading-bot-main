name: Protected NYC Deploy

on:
  workflow_dispatch:
    inputs:
      confirm_production:
        description: "Confirm protected deploy to NYC production"
        required: true
        type: boolean
        default: false
  workflow_run:
    workflows: ["Kalshi CI"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: nyc-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Protected deploy to NYC
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_production == 'true') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'master' &&
       vars.NYC_AUTO_DEPLOY_ENABLED == 'true')
    runs-on: ubuntu-latest
    environment:
      name: nyc-production

    steps:
      - name: Resolve deploy ref
        id: plan
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            echo "deploy_ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "deploy_mode=auto-after-ci" >> "$GITHUB_OUTPUT"
            echo "deploy_reason=Kalshi CI succeeded on master and NYC_AUTO_DEPLOY_ENABLED=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_ref=master" >> "$GITHUB_OUTPUT"
            echo "deploy_mode=manual-dispatch" >> "$GITHUB_OUTPUT"
            echo "deploy_reason=Manual protected dispatch" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout deploy ref
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ steps.plan.outputs.deploy_ref }}

      - name: Assert deploy secret exists
        run: |
          if [ -z "${{ secrets.NYC_SSH_PRIVATE_KEY }}" ]; then
            echo "Missing NYC_SSH_PRIVATE_KEY secret on the nyc-production environment."
            exit 1
          fi

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install proof and deploy dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Create test .env for validation
        run: |
          cat > .env << 'EOF'
          ACCOUNT_SIZE=5000
          FORECAST_LANE_ACTIVE=true
          FORECAST_AUTONOMOUS_ENABLED=true
          KALSHI_API_KEY_ID=test_key_ci
          KALSHI_PRIVATE_KEY_PATH=kalshi_private_key.pem
          TELEGRAM_BOT_TOKEN=test_token
          TELEGRAM_CHAT_ID=123456
          GOOGLE_API_KEY=test_google_key
          EOF

      - name: Kalshi proof gate
        run: |
          python -m pytest \
            tests/proof/test_forecast_lane.py \
            tests/proof/test_resolution_sync.py \
            tests/proof/test_weather_rbi_truth.py \
            tests/proof/test_weather_sovereign.py \
            tests/proof/test_lane_gating.py \
            tests/proof/test_trading_control.py \
            tests/proof/test_scheduler_cadence_config.py \
            tests/proof/test_runtime_layer.py \
            -k "forecast or weather or rbi or lane_economics_forecast or forecast_lane" \
            -q --tb=short --no-header -p no:warnings

      - name: Validate config
        run: |
          python scripts/validate.py

      - name: Repo truth gate (strict)
        run: |
          python scripts/repo_truth_gate.py --strict

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Load production SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.NYC_SSH_PRIVATE_KEY }}

      - name: Seed known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 2222 64.225.20.38 >> ~/.ssh/known_hosts

      - name: Preflight remote reachability
        run: |
          ssh -o BatchMode=yes -p 2222 algo-runner@64.225.20.38 'echo NYC preflight OK'

      - name: Deploy exact authored SHA
        run: |
          chmod +x deploy.sh
          ./deploy.sh

      - name: Verify deployed SHA and services
        run: |
          EXPECTED_SHA="$(git rev-parse HEAD)"
          REMOTE_SHA="$(ssh -o BatchMode=yes -p 2222 algo-runner@64.225.20.38 "awk -F= '/^sha=/{print \$2}' /home/algo-runner/bot/version.txt")"
          if [ "$REMOTE_SHA" != "$EXPECTED_SHA" ]; then
            echo "Remote SHA mismatch: expected $EXPECTED_SHA got $REMOTE_SHA"
            exit 1
          fi
          ssh -o BatchMode=yes -p 2222 algo-runner@64.225.20.38 '
            docker ps --format "{{.Names}} {{.Status}}" | grep "execution-engine" | grep "Up"
            docker ps --format "{{.Names}} {{.Status}}" | grep "telegram-oracle" | grep "Up"
          '

      - name: Deployment summary
        run: |
          {
            echo "## Protected NYC Deploy"
            echo ""
            echo "- Mode: \`${{ steps.plan.outputs.deploy_mode }}\`"
            echo "- Reason: ${{ steps.plan.outputs.deploy_reason }}"
            echo "- SHA: \`$(git rev-parse HEAD)\`"
            echo "- Branch: \`${GITHUB_REF_NAME}\`"
            echo "- Environment: \`nyc-production\`"
          } >> "$GITHUB_STEP_SUMMARY"
