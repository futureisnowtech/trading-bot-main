<svg viewBox="0 0 400 520" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="520" fill="none"/>
  <ellipse cx="200" cy="500" rx="70" ry="10" fill="#00000035"/>
  <!-- Wide stance legs -->
  <path d="M178,360 L148,440 L138,488" stroke="#8D5524" stroke-width="24" stroke-linecap="round" fill="none"/>
  <path d="M222,360 L252,440 L262,488" stroke="#8D5524" stroke-width="24" stroke-linecap="round" fill="none"/>
  <!-- Shoes wide -->
  <rect x="114" y="480" width="52" height="18" rx="9" fill="#E85D04" stroke="#1a0000" stroke-width="1.5"/>
  <rect x="236" y="480" width="52" height="18" rx="9" fill="#E85D04" stroke="#1a0000" stroke-width="1.5"/>
  <!-- Shorts -->
  <rect x="160" y="308" width="80" height="58" rx="12" fill="#E85D04" stroke="#1a0000" stroke-width="2"/>
  <!-- Torso low/forward -->
  <rect x="170" y="230" width="60" height="82" rx="14" fill="#E85D04" stroke="#1a0000" stroke-width="2" transform="rotate(5,200,270)"/>
  <text x="202" y="278" text-anchor="middle" font-size="22" font-weight="bold" fill="#FFBA08" font-family="Arial Black,sans-serif">8</text>
  <!-- Head -->
  <circle cx="200" cy="186" r="42" fill="#8D5524" stroke="#1a0000" stroke-width="2"/>
  <circle cx="186" cy="182" r="5" fill="white"/><circle cx="188" cy="182" r="3" fill="#111"/>
  <circle cx="214" cy="182" r="5" fill="white"/><circle cx="216" cy="182" r="3" fill="#111"/>
  <!-- Scowl -->
  <path d="M185,202 Q200,196 215,202" stroke="#444" stroke-width="2" fill="none"/>
  <line x1="182" y1="176" x2="196" y2="178" stroke="#333" stroke-width="2"/>
  <line x1="204" y1="178" x2="218" y2="176" stroke="#333" stroke-width="2"/>
  <!-- Headband -->
  <rect x="160" y="172" width="80" height="14" rx="7" fill="#FFBA08" stroke="#1a0000" stroke-width="1"/>
  <!-- Arms spread wide -->
  <path d="M170,245 L125,270 L80,285" stroke="#8D5524" stroke-width="20" stroke-linecap="round" fill="none"/>
  <path d="M230,245 L275,270 L320,285" stroke="#8D5524" stroke-width="20" stroke-linecap="round" fill="none"/>
  <!-- Hands -->
  <circle cx="74" cy="285" r="14" fill="#8D5524" stroke="#1a0000" stroke-width="1.5"/>
  <circle cx="326" cy="285" r="14" fill="#8D5524" stroke="#1a0000" stroke-width="1.5"/>
  <!-- Defense text -->
  <text x="200" y="45" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFBA08" font-family="Arial Black,sans-serif" opacity="0.7">DEFENSE</text>
  <!-- D symbol marks -->
  <text x="115" y="315" text-anchor="middle" font-size="28" font-weight="bold" fill="#FFBA08" font-family="Arial Black,sans-serif" opacity="0.4">D</text>
  <text x="285" y="315" text-anchor="middle" font-size="28" font-weight="bold" fill="#FFBA08" font-family="Arial Black,sans-serif" opacity="0.4">!</text>
</svg>