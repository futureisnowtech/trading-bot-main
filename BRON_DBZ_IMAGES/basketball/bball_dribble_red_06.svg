<svg viewBox="0 0 400 520" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="520" fill="none"/>
  <!-- Floor line -->
  <line x1="50" y1="490" x2="350" y2="490" stroke="#FF6B6B" stroke-width="1.5" opacity="0.4"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="494" rx="62" ry="9" fill="#00000035"/>
  <!-- Legs wide (defensive stance) -->
  <path d="M182,360 L162,435 L155,475" stroke="#FDBCB4" stroke-width="22" stroke-linecap="round" fill="none"/>
  <path d="M218,360 L238,430 L248,472" stroke="#FDBCB4" stroke-width="22" stroke-linecap="round" fill="none"/>
  <!-- Shoes -->
  <rect x="132" y="468" width="48" height="18" rx="9" fill="#D62828" stroke="#1a0000" stroke-width="1.5"/>
  <rect x="132" y="468" width="22" height="18" rx="8" fill="#FF6B6B" stroke="#1a0000" stroke-width="1"/>
  <rect x="226" y="465" width="48" height="18" rx="9" fill="#D62828" stroke="#1a0000" stroke-width="1.5"/>
  <rect x="226" y="465" width="22" height="18" rx="8" fill="#FF6B6B" stroke="#1a0000" stroke-width="1"/>
  <!-- Shorts -->
  <rect x="163" y="305" width="74" height="62" rx="12" fill="#D62828" stroke="#1a0000" stroke-width="2"/>
  <!-- Torso (leaning forward) -->
  <rect x="168" y="222" width="64" height="86" rx="14" fill="#D62828" stroke="#1a0000" stroke-width="2" transform="rotate(-8,200,260)"/>
  <text x="200" y="272" text-anchor="middle" font-size="24" font-weight="bold" fill="#FF6B6B" font-family="Arial Black,sans-serif" transform="rotate(-8,200,272)">6</text>
  <!-- Head (tilted) -->
  <circle cx="196" cy="180" r="42" fill="#FDBCB4" stroke="#1a0000" stroke-width="2" transform="rotate(-10,196,180)"/>
  <circle cx="183" cy="177" r="5" fill="white"/><circle cx="185" cy="177" r="3" fill="#111"/>
  <circle cx="208" cy="174" r="5" fill="white"/><circle cx="210" cy="174" r="3" fill="#111"/>
  <!-- Intense look at ball -->
  <path d="M185,195 Q196,190 207,195" stroke="#555" stroke-width="1.5" fill="none"/>
  <!-- Headband -->
  <rect x="158" y="165" width="78" height="14" rx="7" fill="#FF6B6B" stroke="#1a0000" stroke-width="1" transform="rotate(-10,196,172)"/>
  <!-- Right arm down dribbling -->
  <path d="M228,238 L255,290 L262,360" stroke="#FDBCB4" stroke-width="18" stroke-linecap="round" fill="none"/>
  <!-- Left arm out (balance) -->
  <path d="M172,238 L140,265 L115,285" stroke="#FDBCB4" stroke-width="18" stroke-linecap="round" fill="none"/>
  <!-- Ball (low, bouncing) -->
  <circle cx="272" cy="390" r="30" fill="#E55D00" stroke="#6B2D00" stroke-width="1.5"/><path d="M242,390 Q272,351.0 302,390" fill="none" stroke="#6B2D00" stroke-width="1" opacity="0.7"/><path d="M242,390 Q272,429.0 302,390" fill="none" stroke="#6B2D00" stroke-width="1" opacity="0.7"/><path d="M272,360 Q287.0,390 272,420" fill="none" stroke="#6B2D00" stroke-width="0.8" opacity="0.5"/><circle cx="263.0" cy="381.0" r="4.5" fill="white" opacity="0.3"/>
  <!-- Bounce lines -->
  <line x1="272" y1="420" x2="268" y2="490" stroke="#FF6B6B" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>
  <line x1="278" y1="420" x2="282" y2="490" stroke="#FF6B6B" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>
  <!-- Speed lines -->
  <line x1="80" y1="240" x2="130" y2="248" stroke="#FF6B6B" stroke-width="1.5" opacity="0.4"/>
  <line x1="75" y1="255" x2="118" y2="260" stroke="#FF6B6B" stroke-width="1" opacity="0.3"/>
</svg>