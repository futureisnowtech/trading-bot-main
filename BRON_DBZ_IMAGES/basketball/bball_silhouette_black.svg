<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid silhouette - great for dashboard overlays -->
  <g fill="#111" stroke="none">
    <!-- Head -->
    <circle cx="100" cy="60" r="28"/>
    <!-- Torso -->
    <rect x="76" y="85" width="48" height="70" rx="10"/>
    <!-- Shorts -->
    <rect x="72" y="148" width="56" height="45" rx="8"/>
    <!-- Left arm up (dunk) -->
    <path d="M76,95 L52,65 L38,42" stroke="#111" stroke-width="14" stroke-linecap="round" fill="none"/>
    <!-- Right arm with ball -->
    <path d="M124,95 L148,62 L162,38" stroke="#111" stroke-width="14" stroke-linecap="round" fill="none"/>
    <!-- Legs bent -->
    <path d="M82,190 L68,235 L60,272" stroke="#111" stroke-width="16" stroke-linecap="round" fill="none"/>
    <path d="M118,190 L132,232 L142,268" stroke="#111" stroke-width="16" stroke-linecap="round" fill="none"/>
  </g>
  <!-- Ball -->
  <circle cx="170" cy="30" r="22" fill="#555" stroke="#000" stroke-width="1.5"/>
  <path d="M149,30 Q170,15 191,30" fill="none" stroke="#000" stroke-width="1" opacity="0.7"/>
  <path d="M149,30 Q170,45 191,30" fill="none" stroke="#000" stroke-width="1" opacity="0.7"/>
  <!-- Glow ring -->
  <circle cx="100" cy="150" r="90" fill="none" stroke="#555" stroke-width="1.5" opacity="0.2"/>
</svg>