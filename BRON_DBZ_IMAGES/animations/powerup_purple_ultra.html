<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; align-items:center; justify-content:center; height:100vh; overflow:hidden; }
.scene { position:relative; width:400px; height:550px; }
@keyframes aura-pulse {
  0%,100% { opacity:0.6; transform:scaleX(1) scaleY(1); }
  50% { opacity:1; transform:scaleX(1.12) scaleY(1.08); }
}
@keyframes hair-rise {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-4px); }
}
@keyframes lightning {
  0% { opacity:0; }
  10% { opacity:1; }
  20% { opacity:0; }
  30% { opacity:0.8; }
  40% { opacity:0; }
  100% { opacity:0; }
}
@keyframes ground-shake {
  0%,100% { transform:translateX(0); }
  25% { transform:translateX(-3px); }
  75% { transform:translateX(3px); }
}
@keyframes particle-float {
  0% { transform:translateY(0) scale(1); opacity:1; }
  100% { transform:translateY(-200px) scale(0); opacity:0; }
}
@keyframes screaming {
  0%,100% { transform:scaleY(1); }
  50% { transform:scaleY(1.08); }
}
.aura {
  position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
  width:320px; height:480px; border-radius:50%;
  background: radial-gradient(ellipse, #CC44FFCC 0%, #CC44FF66 40%, transparent 70%);
  animation: aura-pulse 0.8s ease-in-out infinite;
}
.warrior { position:absolute; left:50%; bottom:40px; transform:translateX(-50%); animation:screaming 0.8s ease-in-out infinite; }
.bolt { position:absolute; animation: lightning 1.2s ease-in-out infinite; }
.particle { position:absolute; width:6px; height:6px; border-radius:50%; background:#CC44FF; animation:particle-float 2s ease-out infinite; }
.ground { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); animation:ground-shake 0.4s ease-in-out infinite; }
</style>
</head><body>
<div class="scene">
  <div class="aura"></div>
  <!-- Particles -->

;width:4px;height:3px;"></div><div class="particle" style="left:228px;bottom:269px;animation-delay:1.6s;animation-duration:2.2s;width:6px;height:7px;"></div><div class="particle" style="left:245px;bottom:85px;animation-delay:0.7s;animation-duration:2.7s;width:5px;height:8px;"></div><div class="particle" style="left:144px;bottom:211px;animation-delay:0.5s;animation-duration:2.2s;width:8px;height:4px;"></div><div class="particle" style="left:105px;bottom:247px;animation-delay:1.6s;animation-duration:1.7s;width:4px;height:7px;"></div>

    </g>
    <!-- Aura flames (static in SVG, animated via CSS on parent) -->
    <path d="M150,140 Q135,100 132,60 Q145,95 150,118 Q155,95 168,60 Q165,100 150,140Z" fill="#CC44FF" opacity="0.7"/>
    <path d="M120,160 Q100,120 98,75 Q112,110 118,138Z" fill="#CC44FF" opacity="0.5"/>
    <path d="M180,160 Q200,120 202,75 Q188,110 182,138Z" fill="#CC44FF" opacity="0.5"/>
  </svg>
  <!-- Lightning bolts -->
  <svg class="bolt" style="top:0;left:0;width:400px;height:550px;animation-delay:0s;">
    <path d="M80,50 L72,120 L90,108 L78,180" stroke="#CC44FF" stroke-width="3" fill="none" stroke-linecap="round"/>
  </svg>
  <svg class="bolt" style="top:0;left:0;width:400px;height:550px;animation-delay:0.4s;">
    <path d="M320,80 L328,148 L312,138 L322,205" stroke="#CC44FF" stroke-width="2" fill="none" stroke-linecap="round"/>
  </svg>
  <svg class="bolt" style="top:0;left:0;width:400px;height:550px;animation-delay:0.7s;">
    <path d="M160,20 L153,75 L168,66 L158,120" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  </svg>
</div>
</body></html>
