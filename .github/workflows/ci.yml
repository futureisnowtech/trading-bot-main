name: Kalshi CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  proof:
    name: Kalshi proof suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          ACCOUNT_SIZE=5000
          FORECAST_LANE_ACTIVE=true
          FORECAST_AUTONOMOUS_ENABLED=true
          KALSHI_API_KEY_ID=test_key_ci
          KALSHI_PRIVATE_KEY_PATH=kalshi_private_key.pem
          TELEGRAM_BOT_TOKEN=test_token
          TELEGRAM_CHAT_ID=123456
          GOOGLE_API_KEY=test_google_key
          EOF

      - name: Lint with ruff (non-blocking)
        run: |
          ruff check . \
            --exclude=".git,__pycache__,logs" \
            --ignore=E501,E402,F401,F811,W503 \
            --select=E,F,W \
            || true

      - name: Run Kalshi proof gate
        run: |
          python -m pytest \
            tests/proof/test_forecast_lane.py \
            tests/proof/test_resolution_sync.py \
            tests/proof/test_weather_rbi_truth.py \
            tests/proof/test_weather_sovereign.py \
            tests/proof/test_lane_gating.py \
            tests/proof/test_trading_control.py \
            tests/proof/test_scheduler_cadence_config.py \
            tests/proof/test_runtime_layer.py \
            -k "forecast or weather or rbi or lane_economics_forecast or forecast_lane" \
            --tb=long \
            --no-header \
            -v

      - name: Validate config
        run: |
          python scripts/validate.py

      - name: Repo truth gate (strict)
        run: |
          python scripts/repo_truth_gate.py --strict
