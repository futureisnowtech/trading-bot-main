<svg viewBox="0 0 400 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow3" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#555" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="400" height="520" fill="url(#glow3)"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="510" rx="55" ry="9" fill="#00000040"/>
  <!-- Legs straight (jump) -->
  <path d="M183,368 L176,440 L170,480" stroke="#8B4513" stroke-width="22" stroke-linecap="round" fill="none"/>
  <path d="M217,368 L224,440 L230,480" stroke="#8B4513" stroke-width="22" stroke-linecap="round" fill="none"/>
  <!-- Left shoe -->
  <rect x="148" y="473" width="46" height="17" rx="8" fill="#111" stroke="#333" stroke-width="1.5"/>
  <rect x="148" y="473" width="20" height="17" rx="6" fill="#555" stroke="#333" stroke-width="1"/>
  <!-- Right shoe -->
  <rect x="208" y="473" width="46" height="17" rx="8" fill="#111" stroke="#333" stroke-width="1.5"/>
  <rect x="208" y="473" width="20" height="17" rx="6" fill="#555" stroke="#333" stroke-width="1"/>
  <!-- Shorts -->
  <rect x="162" y="316" width="76" height="58" rx="12" fill="#111" stroke="#333" stroke-width="2"/>
  <!-- Torso -->
  <rect x="170" y="232" width="60" height="88" rx="15" fill="#111" stroke="#333" stroke-width="2"/>
  <text x="200" y="285" text-anchor="middle" font-size="24" font-weight="bold" fill="#555" font-family="Arial Black,sans-serif">3</text>
  <!-- Head -->
  <circle cx="200" cy="188" r="42" fill="#8B4513" stroke="#333" stroke-width="2"/>
  <circle cx="188" cy="184" r="5" fill="white"/><circle cx="190" cy="184" r="3" fill="#111"/>
  <circle cx="212" cy="184" r="5" fill="white"/><circle cx="214" cy="184" r="3" fill="#111"/>
  <!-- Focused eyes -->
  <line x1="183" y1="179" x2="196" y2="179" stroke="#111" stroke-width="2.5"/>
  <line x1="208" y1="179" x2="221" y2="179" stroke="#111" stroke-width="2.5"/>
  <path d="M190,202 Q200,198 210,202" stroke="#6B2D00" stroke-width="1.5" fill="none"/>
  <!-- Headband -->
  <rect x="160" y="173" width="80" height="14" rx="7" fill="#555" stroke="#333" stroke-width="1"/>
  <!-- Left arm (guide) -->
  <path d="M170,248 L148,290 L140,330" stroke="#8B4513" stroke-width="17" stroke-linecap="round" fill="none"/>
  <circle cx="136" cy="336" r="12" fill="#8B4513" stroke="#333" stroke-width="1.5"/>
  <!-- Right arm shooting (angled up) -->
  <path d="M230,248 L258,210 L272,170" stroke="#8B4513" stroke-width="17" stroke-linecap="round" fill="none"/>
  <circle cx="276" cy="158" r="13" fill="#8B4513" stroke="#333" stroke-width="1.5"/>
  <!-- Ball in right hand going up -->
  <circle cx="288" cy="118" r="34" fill="#FF6B35" stroke="#6B2D00" stroke-width="1.5"/><path d="M254,118 Q288,73.8 322,118" fill="none" stroke="#6B2D00" stroke-width="1" opacity="0.7"/><path d="M254,118 Q288,162.2 322,118" fill="none" stroke="#6B2D00" stroke-width="1" opacity="0.7"/><path d="M288,84 Q305.0,118 288,152" fill="none" stroke="#6B2D00" stroke-width="0.8" opacity="0.5"/><circle cx="277.8" cy="107.8" r="5.1" fill="white" opacity="0.3"/>
  <!-- Ball trajectory arc (dotted) -->
  <path d="M290,110 Q260,30 160,20 Q90,15 60,60" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
</svg>