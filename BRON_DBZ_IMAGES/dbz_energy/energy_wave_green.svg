<svg viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="beam_green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00DD44" stop-opacity="1"/>
      <stop offset="80%" stop-color="#00DD44" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00DD44" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="origin_green" cx="10%" cy="50%" r="90%">
      <stop offset="0%" stop-color="#CCFFDD"/>
      <stop offset="100%" stop-color="#00DD44" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Beam body (tapered) -->
  <path d="M50,100 L580,130 L580,150 L50,180Z" fill="url(#beam_green)" opacity="0.4"/>
  <path d="M50,112 L570,132 L570,148 L50,168Z" fill="url(#beam_green)" opacity="0.6"/>
  <!-- Core beam -->
  <path d="M50,126 L565,136 L565,144 L50,154Z" fill="#CCFFDD" opacity="0.85"/>
  <!-- Origin ball -->
  <circle cx="52" cy="140" r="46" fill="url(#origin_green)"/>
  <circle cx="52" cy="140" r="30" fill="#00DD44" opacity="0.7"/>
  <circle cx="52" cy="140" r="16" fill="#CCFFDD" opacity="0.9"/>
  <circle cx="44" cy="132" r="6" fill="white" opacity="0.6"/>
  <!-- Beam edge glow -->
  <path d="M50,108 L575,128 L575,132 L50,112Z" fill="#88FFAA" opacity="0.3"/>
  <path d="M50,168 L575,148 L575,152 L50,172Z" fill="#88FFAA" opacity="0.3"/>
  <!-- Energy sparks along beam -->
  <circle cx="44" cy="131" r="3" fill="#88FFAA" opacity="0.9"/><circle cx="93" cy="139" r="1" fill="#88FFAA" opacity="0.8"/><circle cx="139" cy="118" r="4" fill="#88FFAA" opacity="0.9"/><circle cx="190" cy="117" r="1" fill="#88FFAA" opacity="0.7"/><circle cx="243" cy="136" r="4" fill="#88FFAA" opacity="0.4"/><circle cx="296" cy="142" r="2" fill="#88FFAA" opacity="0.7"/><circle cx="348" cy="145" r="2" fill="#88FFAA" opacity="0.4"/><circle cx="385" cy="140" r="2" fill="#88FFAA" opacity="0.7"/><circle cx="442" cy="141" r="1" fill="#88FFAA" opacity="0.7"/><circle cx="492" cy="137" r="4" fill="#88FFAA" opacity="0.8"/><circle cx="526" cy="136" r="2" fill="#88FFAA" opacity="0.5"/>
  <!-- Shockwave rings -->
  <ellipse cx="52" cy="140" rx="70" ry="52" fill="none" stroke="#00DD44" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="52" cy="140" rx="90" ry="66" fill="none" stroke="#00DD44" stroke-width="1" opacity="0.25"/>
  <!-- Impact end flare -->
  <ellipse cx="575" cy="140" rx="24" ry="40" fill="#00DD44" opacity="0.3"/>
  <circle cx="580" cy="140" r="14" fill="#CCFFDD" opacity="0.6"/>
</svg>