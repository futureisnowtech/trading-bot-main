services:
  algo-bot:
    build: .
    container_name: algo-bot-live
    hostname: algo-bot-live
    restart: unless-stopped
    networks:
      - trading-network
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "sqlite3 /app/logs/trades.db \"SELECT connected FROM lane_runtime_state WHERE lane_id='crypto'\" | grep 1 || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    networks:
      - trading-network
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    networks:
      - trading-network
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    networks:
      - trading-network
    volumes:
      - ./logs:/app/logs
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    networks:
      - trading-network
    ports:
      - "3000:3000"
    environment:
      - GF_INSTALL_PLUGINS=volkovlabs-echarts-panel
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

  dashboard:
    build: .
    container_name: algo-dashboard
    restart: unless-stopped
    networks:
      - trading-network
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    command: ["python3", "-m", "uvicorn", "dashboard.api.server:app", "--host", "0.0.0.0", "--port", "8080"]
    depends_on:
      - algo-bot

networks:
  trading-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
