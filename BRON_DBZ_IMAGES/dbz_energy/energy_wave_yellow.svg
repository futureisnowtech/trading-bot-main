<svg viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="beam_yellow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFCC00" stop-opacity="1"/>
      <stop offset="80%" stop-color="#FFCC00" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFCC00" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="origin_yellow" cx="10%" cy="50%" r="90%">
      <stop offset="0%" stop-color="#FFFFCC"/>
      <stop offset="100%" stop-color="#FFCC00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Beam body (tapered) -->
  <path d="M50,100 L580,130 L580,150 L50,180Z" fill="url(#beam_yellow)" opacity="0.4"/>
  <path d="M50,112 L570,132 L570,148 L50,168Z" fill="url(#beam_yellow)" opacity="0.6"/>
  <!-- Core beam -->
  <path d="M50,126 L565,136 L565,144 L50,154Z" fill="#FFFFCC" opacity="0.85"/>
  <!-- Origin ball -->
  <circle cx="52" cy="140" r="46" fill="url(#origin_yellow)"/>
  <circle cx="52" cy="140" r="30" fill="#FFCC00" opacity="0.7"/>
  <circle cx="52" cy="140" r="16" fill="#FFFFCC" opacity="0.9"/>
  <circle cx="44" cy="132" r="6" fill="white" opacity="0.6"/>
  <!-- Beam edge glow -->
  <path d="M50,108 L575,128 L575,132 L50,112Z" fill="#FFEE88" opacity="0.3"/>
  <path d="M50,168 L575,148 L575,152 L50,172Z" fill="#FFEE88" opacity="0.3"/>
  <!-- Energy sparks along beam -->
  <circle cx="47" cy="128" r="1" fill="#FFEE88" opacity="0.9"/><circle cx="108" cy="116" r="4" fill="#FFEE88" opacity="0.8"/><circle cx="155" cy="144" r="2" fill="#FFEE88" opacity="0.8"/><circle cx="192" cy="141" r="4" fill="#FFEE88" opacity="0.6"/><circle cx="232" cy="118" r="4" fill="#FFEE88" opacity="0.4"/><circle cx="290" cy="139" r="4" fill="#FFEE88" opacity="0.4"/><circle cx="346" cy="140" r="1" fill="#FFEE88" opacity="0.8"/><circle cx="383" cy="135" r="1" fill="#FFEE88" opacity="0.8"/><circle cx="428" cy="144" r="4" fill="#FFEE88" opacity="0.4"/><circle cx="476" cy="118" r="1" fill="#FFEE88" opacity="0.4"/><circle cx="526" cy="131" r="1" fill="#FFEE88" opacity="0.7"/>
  <!-- Shockwave rings -->
  <ellipse cx="52" cy="140" rx="70" ry="52" fill="none" stroke="#FFCC00" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="52" cy="140" rx="90" ry="66" fill="none" stroke="#FFCC00" stroke-width="1" opacity="0.25"/>
  <!-- Impact end flare -->
  <ellipse cx="575" cy="140" rx="24" ry="40" fill="#FFCC00" opacity="0.3"/>
  <circle cx="580" cy="140" r="14" fill="#FFFFCC" opacity="0.6"/>
</svg>