<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFA500" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg1)"/>
  <g transform="">
    <!-- Shadow -->
    <ellipse cx="200" cy="488" rx="60" ry="10" fill="#00000040"/>
    <!-- Body (torso) -->
    <rect x="168" y="230" width="64" height="90" rx="16" fill="#FFD700" stroke="#222" stroke-width="2"/>
    <!-- Jersey number -->
    <text x="200" y="285" text-anchor="middle" font-size="28" font-weight="bold" fill="#FFA500" font-family="Arial Black,sans-serif" opacity="0.9">1</text>
    <!-- Shorts -->
    <rect x="162" y="312" width="76" height="60" rx="10" fill="#FFD700" stroke="#222" stroke-width="2" opacity="0.9"/>
    <!-- Left Leg (bent - jumping) -->
    <path d="M178,368 L165,420 L158,455" stroke="#8B4513" stroke-width="20" stroke-linecap="round" fill="none"/>
    <!-- Right Leg (bent) -->
    <path d="M222,368 L235,415 L245,450" stroke="#8B4513" stroke-width="20" stroke-linecap="round" fill="none"/>
    <!-- Left shoe -->
    <ellipse cx="154" cy="460" rx="22" ry="12" fill="#FFA500" stroke="#222" stroke-width="1.5"/>
    <rect x="134" y="455" width="42" height="14" rx="7" fill="#FFD700" stroke="#222" stroke-width="1"/>
    <!-- Right shoe -->
    <ellipse cx="248" cy="456" rx="22" ry="12" fill="#FFA500" stroke="#222" stroke-width="1.5"/>
    <rect x="228" y="451" width="42" height="14" rx="7" fill="#FFD700" stroke="#222" stroke-width="1"/>
    <!-- Head -->
    <circle cx="200" cy="185" r="44" fill="#8B4513" stroke="#222" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="186" cy="182" r="5" fill="white"/><circle cx="188" cy="182" r="3" fill="#111"/>
    <circle cx="214" cy="182" r="5" fill="white"/><circle cx="216" cy="182" r="3" fill="#111"/>
    <!-- Mouth - intense expression -->
    <path d="M188,200 L200,207 L212,200" stroke="#111" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Headband -->
    <rect x="158" y="170" width="84" height="16" rx="8" fill="#FFA500" stroke="#222" stroke-width="1" opacity="0.9"/>
    <!-- Left Arm (up holding ball) -->
    <path d="M168,245 L135,200 L115,165" stroke="#8B4513" stroke-width="18" stroke-linecap="round" fill="none"/>
    <!-- Right Arm (up, pushing ball) -->
    <path d="M232,245 L268,195 L290,155" stroke="#8B4513" stroke-width="18" stroke-linecap="round" fill="none"/>
    <!-- Hand right -->
    <circle cx="293" cy="148" r="14" fill="#8B4513" stroke="#222" stroke-width="1.5"/>
    <!-- Ball -->
    <circle cx="310" cy="118" r="36" fill="#F4A261" stroke="#6B2D00" stroke-width="1.5"/><path d="M274,118 Q310,71.19999999999999 346,118" fill="none" stroke="#6B2D00" stroke-width="1" opacity="0.7"/><path d="M274,118 Q310,164.8 346,118" fill="none" stroke="#6B2D00" stroke-width="1" opacity="0.7"/><path d="M310,82 Q328.0,118 310,154" fill="none" stroke="#6B2D00" stroke-width="0.8" opacity="0.5"/><circle cx="299.2" cy="107.2" r="5.3999999999999995" fill="white" opacity="0.3"/>
    <!-- Motion lines -->
    <line x1="320" y1="80" x2="340" y2="50" stroke="#FFA500" stroke-width="2" opacity="0.6" stroke-dasharray="4,3"/>
    <line x1="340" y1="90" x2="365" y2="65" stroke="#FFA500" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
    <!-- Sweat drops -->
    <ellipse cx="238" cy="165" rx="4" ry="6" fill="white" opacity="0.5"/>
    <ellipse cx="255" cy="155" rx="3" ry="5" fill="white" opacity="0.35"/>
  </g>
</svg>